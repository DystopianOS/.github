name: "Rotate Daily"


on:
  workflow_dispatch:
  schedule:
    - cron: '3 22 * * *' # Every day at 3:22 AM UTC

jobs:
  rotate-suffix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Create GitHub App Token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.DYSTOPIANBOT_APP_ID }}
          private-key: ${{ secrets.DYSTOPIANBOT_KEY }}
          permission-secrets: write
          permission-organization-secrets: write
          owner: ${{ github.repository_owner }}

      - name: Get Old Suffix
        id: old_suffix
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          printf '%s' "${{ secrets.KEY_SUFFIX }}" | gh secret set "KEY_SUFFIX_OLD" --env "experimental" || {
            echo "::error::Failed to set new key as secret" >&2
            exit 1
          }

      - name: Update Key Suffix
        id: update_suffix
        if: steps.old_suffix.outputs.oldsuffix != '' && steps.old_suffix.outputs.oldsuffix != 'null'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          openssl rand -base64 128 | tr "[:lower:]" "[:upper:]" | tr -d '/+=' | head -c 8 | gh secret set "KEY_SUFFIX" --env "experimental" || {
            echo "::error::Failed to set KEY_SUFFIX secret" >&2
            exit 1
          }

  rotate:
    runs-on: ubuntu-latest
    needs: rotate-suffix
    permissions:
      contents: write
      actions: write
    steps:
      - name: Create GitHub App Token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.DYSTOPIANBOT_APP_ID }}
          private-key: ${{ secrets.DYSTOPIANBOT_KEY }}
          permission-secrets: write
          permission-organization-secrets: write
          owner: ${{ github.repository_owner }}

      - name: Backup Old Key
        id: backup_old_key
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          RK0="RANDOM_KEY_${{ secrets.KEY_SUFFIX_OLD }}0"
          RK1="${{ inputs.key_name || format('RANDOM_KEY_{0}1', secrets.KEY_SUFFIX_OLD) }}"
          RK2="${{ inputs.key_name || format('RANDOM_KEY_{0}2', secrets.KEY_SUFFIX_OLD) }}"
          if printf '%s\n' ${{ secrets.BACKUP_KEYS }} "$RK0" "$RK1" "$RK2" | \
            gh secret set "BACKUP_KEYS" --env "experimental" || {
              echo "::warning::Failed to backup old key '$keyname', it may not exist or is already deleted" >&2
          }; then
            echo "Old key(s) backed up successfully: $RK0 $RK1 $RK2"
            echo "success=true" >> "$GITHUB_OUTPUT"
          else
            echo "No old keys to backup or backup failed"
          fi

      - name: New Key
        id: new_key
        if: steps.backup_old_key.outputs.success == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          KEY_NAMES=(
            "${{ format('RANDOM_KEY_{0}0', secrets.KEY_SUFFIX || 'XXX') }}"
            "${{ inputs.key_name || format('RANDOM_KEY_{0}1', secrets.KEY_SUFFIX || 'XXX') }}"
            "###${{ inputs.key_name || format('RANDOM_KEY_{0}2', secrets.KEY_SUFFIX || 'XXX') }}###"
          )

          printf '%s\n' "${KEY_NAMES[@]}" | while IFS= read -r keyname; do
            [ -z "$keyname" ] && continue
            [[ "$keyname" =~ ^\#\#\#.*\#\#\#$ ]] && { keyname=$(printf '%s' "$keyname" | sed -e 's/\#\#\#//g') && l=32 ;} 
            openssl rand -base64 128 | tr -d '/+=' | head -c ${l:-64} | \
              gh secret set "$keyname" \
                        --org "${{ github.repository_owner }}" \
                        --repos "${{ github.repository }},${{ secrets.AUR_DB_REPO_NAME }},${{ secrets.AUR_PKGBUILDS_REPO_NAME }}" \
                        --visibility "selected" || {
                echo "::error::Failed to set new key as secret" >&2
                exit 1
            }
          done
          gh secret list --org "${{ github.repository_owner }}" | awk -F' ' '{print $1}' | grep -E "^RANDOM_KEY_${{ secrets.KEY_SUFFIX }}$" || {
            echo "::error::Failed to verify new key creation" >&2
            exit 1
          }
          
          echo "success=true" >> "$GITHUB_OUTPUT"
          echo "New key(s) set successfully: ${KEY_NAMES[*]}" | sed -e 's/\#\#\#//g'

      - name: Delete Old Keys
        id: delete_old_keys
        if: steps.new_key.outputs.success == 'true' && steps.backup_old_key.outputs.success == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          KEY_NAMES=(
            "${{ format('RANDOM_KEY_{0}0', secrets.KEY_SUFFIX_OLD) }}"
            "${{ inputs.key_name || format('RANDOM_KEY_{0}1', secrets.KEY_SUFFIX_OLD) }}"
            "${{ inputs.key_name || format('RANDOM_KEY_{0}2', secrets.KEY_SUFFIX_OLD) }}"
          )
          
          len=$(gh secret list --org "${{ github.repository_owner }}" | awk -F' ' '{print $1}' | grep -E "^RANDOM_KEY_" | wc -c)
          if [[ $len -gt 3 ]]; then
            echo "Old key(s) found for deletion: ${KEY_NAMES[*]}" | sed -e 's/\#\#\#//g'
          else
            echo "No old keys found for deletion, they may have already been deleted or never existed"
            exit 0
          fi
          
          printf '%s\n' "${KEY_NAMES[@]}" | while IFS= read -r keyname; do
            gh secret delete "$keyname" --org "${{ github.repository_owner }}" || {
              echo "::error::Failed to delete old key '$keyname'" >&2
              exit 1
            }
          done
          
          echo "Old key(s) deleted successfully: ${KEY_NAMES[*]}" | sed -e 's/\#\#\#//g'
